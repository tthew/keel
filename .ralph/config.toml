[hooks]
# Number of `hook-self-protection` blocks per Ralph iteration that triggers a SECURITY_CRITICAL halt.
# Source: docs/invariants/claude-hook-denylist.md § Halt-threshold pin.
# Consumer: Epic 3 Story 3.7 reads this value + counts blocks in
# ${RALPH_BASE_DIR}/logs/<iter-id>/blocked-tool-calls.jsonl + writes the halt sentinel.
#
# D-23 range contract (Story 2.17 Task 10.1): integer in [1, 100]. Out-of-range, non-integer, or
# missing values MUST be treated by the consumer as the default 3 + a stderr warning
# ("[ralph] self_protection_halt_threshold out of range or invalid; falling back to 3").
# Consumer-side validation is Epic 3 Story 3.7's delivery; Story 2.17 pins the contract here.
self_protection_halt_threshold = 3
