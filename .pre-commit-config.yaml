# Pre-commit quality gates (Story 1.4).
# Runs under @j178/prek — drop-in pre-commit framework reimplementation.
# Hook budget: ≤10 s total (pre-commit tier per architecture.md § CI pyramid).
# Cache-warm runs typically stay under 1 s via turbo FULL TURBO.
repos:
  - repo: local
    hooks:
      - id: typecheck
        name: TypeScript type-check (workspace)
        entry: pnpm -w typecheck
        language: system
        pass_filenames: false
        always_run: true
      - id: lint
        name: ESLint (workspace)
        entry: pnpm -w lint
        language: system
        pass_filenames: false
        always_run: true
      - id: format-check
        name: Prettier format:check (workspace)
        entry: pnpm -w format:check
        language: system
        pass_filenames: false
        always_run: true
      - id: no-committed-dotfiles
        name: Refuse committed .envrc / .secrets (@keel/keel-invariants; Story 2.2 AC5)
        entry: pnpm keel-invariants:no-committed-dotfiles
        language: system
        pass_filenames: true
        files: '(^|/)\.(envrc|envrc\.local|secrets|claude/settings\.local\.json)$'
      - id: claude-hook-syntax
        name: Claude PreToolUse hook syntax check (@keel/keel-invariants; Story 2.17 Task 12)
        entry: pnpm keel-invariants:claude-hook-syntax
        language: system
        pass_filenames: false
        files: ^\.claude/hooks/.*\.sh$
      - id: nfr5a-minimum
        name: NFR5a deny-list minimum-entry gate (@keel/keel-invariants; Story 2.17 Task 11.2)
        entry: pnpm keel-invariants:nfr5a-minimum
        language: system
        pass_filenames: false
        files: ^\.claude/settings\.json$
      - id: tokens-schema
        name: Design-token schema validation (@keel/keel-invariants)
        entry: pnpm keel-invariants:tokens-schema
        language: system
        pass_filenames: false
        files: ^packages/ui/tokens\.json$
      - id: tokens-contrast
        name: Design-token WCAG AA contrast check (@keel/keel-invariants)
        entry: pnpm keel-invariants:tokens-contrast
        language: system
        pass_filenames: false
        files: ^packages/ui/tokens\.json$
      - id: commitlint
        name: commitlint (conventional commits)
        entry: pnpm exec commitlint --edit
        language: system
        stages: [commit-msg]
