# packages/devbox/dnsmasq/dnsmasq.conf — Story 2.3 (AC 1, AC 3)
#
# Template rendered at container start by scripts/reload-egress.sh into
# /etc/dnsmasq.conf. The marker block `KEEL_EGRESS_ALLOWLIST_MARKER_{START,END}`
# is replaced at reload time with `server=/<domain>/${KEEL_DEVBOX_DNS_UPSTREAM}`
# directives derived from the composed whitelist.
#
# Operating posture: fail-closed forwarding resolver. Any domain NOT in the
# whitelist resolves to `0.0.0.0` (IPv4) / `::` (IPv6) via the default
# `address=/#/…` rules below; the nftables layer separately drops TCP/UDP
# to any non-whitelisted IP (belt-and-braces per architecture § S5).
#
# DO NOT edit /etc/dnsmasq.conf at runtime — `kill -HUP dnsmasq` re-reads
# this file via reload-egress.sh only.

# --- Hardening -------------------------------------------------------------
domain-needed
bogus-priv
stop-dns-rebind

# Do not read /etc/resolv.conf or /etc/hosts for upstream resolution —
# upstream is injected explicitly via `server=/<domain>/<ip>` directives
# rendered from KEEL_DEVBOX_DNS_UPSTREAM by reload-egress.sh.
no-hosts
no-resolv

# --- Listening surface -----------------------------------------------------
listen-address=127.0.0.1,::1
port=53
bind-interfaces

# --- Privilege posture (Story 2.5 — no user/group drop) -------------------
# dnsmasq is launched as ROOT from `packages/devbox/scripts/reload-egress.sh:407`
# (call chain: docker-compose `user: "0:0"` → entrypoint.sh → start-egress.sh
# → reload-egress.sh → `dnsmasq --conf-file=...`; no gosu in any link before
# the dnsmasq exec). It binds :53 under root authority and then DROPS to
# user `nobody` by its own default behaviour (dnsmasq(8) "if no user= is
# specified, dnsmasq drops privileges to user `nobody` after binding the
# privileged port"). The cross-UID privilege boundary is what motivates
# the `CAP_KILL` entry in `docker-compose.yml` cap_add — root reloader
# signalling the dropped-to-nobody dnsmasq for SIGHUP reload requires
# CAP_KILL per capabilities(7).
#
# Why no explicit `user=`/`group=` directive:
#   (1) dnsmasq's default drop-to-nobody happens automatically after :53
#       bind — no config needed. Adding `user=nobody` would be a no-op.
#   (2) CAP_SETUID / CAP_SETGID ARE in the bounding set today (cap_add
#       at docker-compose.yml L205-206 restores both for gosu's
#       drop-from-root path at the end of entrypoint.sh — capabilities(7)
#       gates setuid(2)/setgid(2) on these two caps under `cap_drop:
#       [ALL]`). The drop-to-nobody nonetheless happens during dnsmasq's
#       own startup — its setuid call lands well before any external
#       policy reduction would apply, so the directive's outcome is set
#       by dnsmasq's default behaviour, not by the bounding set's
#       contents.
#   (3) Adding `user=<other>` would now SUCCEED (CAP_SETUID is in the
#       bounding set, so the syscall does NOT EPERM) but would silently
#       change the drop target AWAY from `nobody`. The rest of the stack
#       documents `nobody` as the drop target (README.md § Capability
#       rationale, the CAP_KILL rationale at docker-compose.yml § cap_add,
#       start-egress.sh § Step 6 dnsmasq probe); a different drop target
#       would diverge silently from those references with no startup
#       signal. Leave `user=` unset to match dnsmasq's documented default
#       and keep the rest of the stack truthful.
#
# DO NOT re-add `user=`/`group=` directives — the default dnsmasq drop
# already lands on `nobody`, and an explicit override silently moves the
# drop target away from `nobody` without any signal at startup.
#
# Cross-references (this comment is the canonical privilege-posture site;
# the other three sites should match this verbatim):
#   - packages/devbox/scripts/start-egress.sh § Step 6 dnsmasq probe
#   - packages/devbox/scripts/reload-egress.sh § dnsmasq SIGHUP block
#   - packages/devbox/docker-compose.yml § cap_add KILL rationale

# --- Query log (SC-3 feeder) ----------------------------------------------
# Feeds packages/devbox/scripts/egress-log-tailer.sh which parses + re-emits
# JSONL records to /workspace/${KEEL_DEVBOX_REPO_NAME}/logs/egress-queries.jsonl per SC-3 schema.
log-queries=extra
log-facility=/var/log/dnsmasq.log

# --- Fail-closed default (SC-12) ------------------------------------------
# Every domain NOT explicitly allow-listed returns 0.0.0.0 / ::
# Closes upstream cc-devbox's IPv6-gap bug (upstream only blocked IPv4).
address=/#/0.0.0.0
address=/#/::

# --- PID file (consumed by reload-egress.sh `kill -HUP`) ------------------
pid-file=/run/dnsmasq.pid

# --- Allow-list server= directives ----------------------------------------
# The marker block below is replaced at reload time by reload-egress.sh with
# one `server=/<domain>/${KEEL_DEVBOX_DNS_UPSTREAM}` per composed-whitelist
# entry. DO NOT hand-edit between the markers — they are the atomic-reload
# substitution region.
# KEEL_EGRESS_ALLOWLIST_MARKER_START
# (injected at reload time)
# KEEL_EGRESS_ALLOWLIST_MARKER_END
